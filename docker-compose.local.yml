services:
  openclaw:
    build:
      context: .
      dockerfile: ./images/openclaw/Dockerfile
      args:
        OPENCLAW_BASE: ${OPENCLAW_BASE:-coollabsio/openclaw:latest}
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-changeme}
      - OPENCLAW_MODEL_PRIMARY=${OPENCLAW_MODEL_PRIMARY:-openai/gpt-5-mini}
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_GATEWAY_PORT=18789
      - OPENCLAW_CONFIG_PATH=/data/openclaw.json
      - OPENCLAW_STATE_DIR=/data/.openclaw
      - OPENCLAW_WORKSPACE_DIR=/data/workspaces
      - BROWSER_CDP_URL=http://browser:9222
      - OPENCODE_BASE_URL=http://opencode:4096
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-changeme}
      - OPENCODE_ATTACH_URL=http://${OPENCODE_SERVER_USERNAME:-opencode}:${OPENCODE_SERVER_PASSWORD:-changeme}@opencode:4096
      - OPENCODE_MODEL=${OPENCODE_MODEL:-openai/gpt-5-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      browser:
        condition: service_healthy
      opencode:
        condition: service_healthy
    volumes:
      - ./_local_data:/data
    ports:
      - "18789:18789"

  browser:
    image: coollabsio/openclaw-browser:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - CHROME_CLI=--remote-debugging-port=9222 --remote-debugging-address=0.0.0.0 --remote-allow-origins=*
    volumes:
      - ./_browser_data:/config
    shm_size: 2g
    healthcheck:
      test: ["CMD-SHELL", "bash -lc ':> /dev/tcp/127.0.0.1/9222' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  opencode:
    build:
      context: .
      dockerfile: ./images/opencode/Dockerfile
      args:
        OPENCODE_BASE: ${OPENCODE_BASE:-ghcr.io/anomalyco/opencode:latest}
    working_dir: /data/workspaces/dev
    environment:
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-changeme}
      - OPENCODE_CONFIG_DIR=/data/opencode
      - OPENCODE_CONFIG=/data/opencode/opencode.jsonc
      - OPENCODE_MODEL=${OPENCODE_MODEL:-openai/gpt-5-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./_local_data:/data
      - ./_local_opencode_share:/root/.local/share/opencode
      - ./_local_opencode_cache:/root/.cache/opencode
    ports:
      - "4096:4096"
